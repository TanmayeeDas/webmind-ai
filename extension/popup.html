<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WebMind AI</title>

    <link rel="stylesheet" href="popup.css">
</head>


<body>

    <div class="container">

        <h1>🧠 WebMind AI</h1>

        <p class="subtitle">
            Ask anything about the current webpage
        </p>

        <textarea
            id="question"
            placeholder="Ask a question..."
        ></textarea>

        <div class="page-card">

            <h3>🌐 Current Page</h3>

            <div id="pageTitle">

                Detecting page...

            </div>

        </div>

        <button id="askButton">
            Ask
        </button>

        <div class="answer-card">

            <h3>🤖 Answer</h3>

            <div id="response">

                Waiting for your question...

            </div>

            <button id="copyButton">

                📋 Copy Answer

            </button> 

        </div>

    </div>

    <script src="popup.js"></script>

</body>
