<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WebMind AI</title>

    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <h1>WebMind AI</h1>

    <p>Ask anything about the current webpage.</p>

    <textarea
        id="question"
        placeholder="Example: Summarize this page..."
    ></textarea>

    <button id="askButton">
        Ask
    </button>

    <hr>

    <h3>Response</h3>

    <div id="response">
        Waiting for your question...
    </div>

    <script src="popup.js"></script>

</body>

</html>
